<title>Login</title>
</head>
<body class="loginBG">

 <section class="container-fluid "><br><br><br>
            <div class="row justify-content-center pt-5">

                <div class="col-12 rounded border shadow p-3 col-md-3 pt-5 pb-4 border mb-5 bg-blueGradient" id="col-Login" >
                            <p class="text-center text-white font-weight-bold h5"><i class="fa fa-lock" aria-hidden="true"></i>
 Login</p>
                        
                            <form class="login-form"  method="POST">
                                <div class="form-group" id="errorLogin" >
                                </div>
                                <div class="form-group">
                                    <label class="text-white">User name*</label>
                                    <input type="text" id="user" name="user" class="form-control rounded-0" placeholder="Abc" required>    
                                </div>
                                <div class="form-group">
                                    <label class="text-white">Password*</label>
                                    <input type="password" class="form-control rounded-0"  id="password" name="password"  placeholder="Password" required>
                                </div>
								 <div class="form-group">
                                     <label class="text-white">Lab Number*</label>
                                    <input type="password" class="form-control rounded-0"  id="password" name="password"  placeholder="Lab No." required>
                                </div>
                                <div class="form-group text-center">
                                    <input type="submit" class="btn btn-dark rounded-0 btn-sm font-weight-bold" value="Login" />                              
                                </div>
                            </form>
                        </div>
                </div>
            </section>
<script type="text/javascript" src="js/jquery.js"></script>
<script type="text/javascript" src="js/popper.min.js"></script>
